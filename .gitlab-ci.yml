# Loyalty Platform — CI pipeline (lint, test, synth, deploy)
# See docs/DECISIONS.md and docs/DEPLOY.md.

default:
  image: node:20

stages:
  - lint
  - test
  - synth
  - backend
  - deploy

variables:
  NODE_ENV: test
  CDK_DEFAULT_ACCOUNT: $AWS_ACCOUNT_ID
  CDK_DEFAULT_REGION: $AWS_REGION

lint:api:
  stage: lint
  script:
    - cd packages/api && npm ci && npm run lint 2>/dev/null || true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

lint:web:
  stage: lint
  script:
    - cd packages/web && npm ci && npm run build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

lint:infra:
  stage: lint
  script:
    - cd packages/infra && npm ci && npm run build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

test:api:
  stage: test
  script:
    - cd packages/api && npm ci && npm run build
    - node --test test/**/*.test.js 2>/dev/null || echo "No tests yet"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

test:web:
  stage: test
  script:
    - cd packages/web && npm ci && npm run test -- --run
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" || $CI_COMMIT_BRANCH == "develop"

test:integration:
  stage: test
  script:
    - cd packages/api && npm ci
    - cd packages/api && npm run test:integration
  rules:
    - if: $API_BASE_URL != null && ($CI_PIPELINE_SOURCE == "merge_request_event" || $CI_COMMIT_BRANCH == "develop")
  variables:
    API_BASE_URL: $API_BASE_URL

synth:
  stage: synth
  script:
    - cd packages/api && npm ci && npm run build
    - cd packages/web && npm ci && npm run build
    - cd packages/infra && npm ci && npx cdk synth -q
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" || $CI_COMMIT_BRANCH == "develop"

backend:lint:
  stage: backend
  image: python:3.11
  script:
    - cd packages/backend && pip install -e ".[dev]" -q
    - cd packages/backend && ruff check src tests && black --check src tests
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

backend:test:
  stage: backend
  image: python:3.11
  script:
    - cd packages/backend && pip install -e ".[dev]" -q
    - cd packages/backend && pytest -v
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" || $CI_COMMIT_BRANCH == "develop"

# Deploy dev on develop. Requires CI/CD variables: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_ACCOUNT_ID, AWS_REGION. Runner needs Docker for Lambda images.
deploy:dev:
  stage: deploy
  image: node:20
  before_script:
    - cd packages/web && npm ci && npm run build
    - cd ../infra && npm ci
    - npx cdk bootstrap 2>/dev/null || true
  script:
    - npx cdk deploy -c environment=dev --require-approval never
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
  environment:
    name: dev

# Deploy prod on tag (e.g. v1.0.0). Same CI/CD variables and Docker requirement.
deploy:prod:
  stage: deploy
  image: node:20
  before_script:
    - cd packages/web && npm ci && npm run build
    - cd ../infra && npm ci
    - npx cdk bootstrap 2>/dev/null || true
  script:
    - npx cdk deploy -c environment=prod --require-approval never
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  environment:
    name: production
